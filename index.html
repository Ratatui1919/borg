<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups">
    
    <title>Balancio PRO · фінансовий баланс</title>
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body data-theme="dark" data-accent="blue">
    <div class="refresh-indicator" id="refreshIndicator">
        <i class="fas fa-sync-alt"></i>
        <span>Оновлення даних...</span>
    </div>

    <div class="container">
        <!-- Landing Page -->
        <div id="landingPage" class="landing-page">
            <div class="landing-content">
                <div class="landing-logo">
                    <i class="fas fa-scale-balanced"></i>
                </div>
                <h1 class="landing-title">Balancio</h1>
                <p class="landing-subtitle">Ваш персональний фінансовий баланс</p>
                
                <div class="landing-features" id="featuresGrid"></div>

                <div class="landing-card">
                    <div class="landing-stats">
                        <div class="landing-stat">
                            <div class="landing-stat-value">10k+</div>
                            <div class="landing-stat-label">користувачів</div>
                        </div>
                        <div class="landing-stat">
                            <div class="landing-stat-value">100k+</div>
                            <div class="landing-stat-label">транзакцій</div>
                        </div>
                        <div class="landing-stat">
                            <div class="landing-stat-value">50k+</div>
                            <div class="landing-stat-label">цілей</div>
                        </div>
                    </div>

                    <button class="landing-btn" id="landingLoginBtn">
                        <i class="fab fa-google"></i>
                        Увійти через Google
                    </button>
                </div>
            </div>
        </div>

        <!-- Main App -->
        <div id="mainApp" style="display: none;">
            <div class="main-card">
                <!-- Header -->
                <div class="header">
                    <div class="logo">
                        <div class="logo-icon">
                            <i class="fas fa-scale-balanced"></i>
                        </div>
                        <span class="logo-text">Balancio</span>
                        <span class="logo-badge">
                            <i class="fas fa-crown"></i> PRO
                        </span>
                    </div>
                    <div class="user-info">
                        <span class="user-email" id="userEmail">
                            <i class="fas fa-user-circle"></i>
                            <span></span>
                        </span>
                        <button class="btn-logout" id="logoutBtn">
                            <i class="fas fa-sign-out-alt"></i>
                            <span>Вийти</span>
                        </button>
                    </div>
                </div>

                <!-- Navigation -->
                <div class="nav-tabs" id="navTabs"></div>

                <!-- Pages -->
                <div id="debtsPage" class="page"></div>
                <div id="goalsPage" class="page"></div>
                <div id="journalPage" class="page"></div>
                <div id="bankPage" class="page"></div>
                <div id="budgetPage" class="page"></div>
                <div id="recurringPage" class="page"></div>
                <div id="analyticsPage" class="page"></div>
                <div id="tipsPage" class="page"></div>
                <div id="archivePage" class="page"></div>
                <div id="themesPage" class="page"></div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div class="modal" id="goalModal"></div>
    <div class="modal" id="transactionModal"></div>
    <div class="modal" id="bankModal"></div>
    <div class="modal" id="recurringModal"></div>
    <div class="modal" id="budgetModal"></div>

    <!-- Scripts -->
    <script src="firebase.js"></script>
    <script src="pages.js"></script>
    <script src="app.js"></script>
</body>
</html>
