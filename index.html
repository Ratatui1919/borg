<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>БОРГИ · універсальний</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: #0A0A0A;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 12px;
        }

        .app {
            max-width: 1400px;
            width: 100%;
            background: #111111;
            border-radius: 48px;
            border: 1px solid #262626;
            padding: 32px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9);
        }

        /* ========== ЗАГАЛЬНІ СТИЛІ ========== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #B0B0B0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .privacy {
            background: #1C1C1C;
            color: #B0B0B0;
            padding: 10px 24px;
            border-radius: 40px;
            border: 1px solid #333;
            font-size: 1rem;
        }

        /* PDF кнопки */
        .pdf-buttons {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .pdf-btn {
            background: #1E1E1E;
            border: 1px solid #3A3A3A;
            color: white;
            padding: 16px 28px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: 0.2s;
            flex: 1 1 auto;
        }

        .pdf-btn.save { background: #1E2A1E; border-color: #3A5A3A; color: #B0FFB0; }
        .pdf-btn.load { background: #1E1E2A; border-color: #3A3A5A; color: #B0B0FF; }
        .pdf-btn:hover { filter: brightness(1.3); transform: translateY(-2px); }

        .create-btn {
            background: #1E1E1E;
            border: 1px solid #3A3A3A;
            color: white;
            padding: 16px 28px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 32px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: 0.2s;
        }

        .create-btn:hover { background: #2A2A2A; border-color: #5A5A5A; }

        /* Сітка цілей */
        .goals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
            margin-bottom: 48px;
        }

        .goal-card {
            background: #161616;
            border-radius: 32px;
            padding: 28px;
            border: 1px solid #2A2A2A;
            position: relative;
        }

        .goal-delete {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 36px;
            height: 36px;
            background: #2A1F1F;
            border: 1px solid #4A3535;
            color: #FF8E7A;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.15s;
            z-index: 10;
        }

        .goal-delete:hover { background: #3A2A2A; }

        .goal-name { font-size: 1.8rem; font-weight: 600; color: #E0E0E0; margin-bottom: 8px; padding-right: 40px; }
        .goal-currency { color: #888; font-size: 1rem; margin-bottom: 12px; }
        .goal-target { font-size: 2.5rem; font-weight: 700; color: #78C578; margin: 16px 0; }

        .progress-stats {
            display: flex;
            justify-content: space-between;
            color: #B0B0B0;
            font-size: 0.95rem;
            margin: 16px 0 8px;
        }

        .progress-bar {
            background: #252525;
            height: 20px;
            border-radius: 40px;
            overflow: hidden;
            border: 1px solid #353535;
            margin-bottom: 20px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #78C578, #A0D8A0);
            border-radius: 40px;
            transition: width 0.3s ease;
        }

        .goal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .action-group {
            flex: 2;
            display: flex;
            gap: 8px;
            background: #1E1E1E;
            padding: 4px;
            border-radius: 60px;
            border: 1px solid #333;
        }

        .action-group input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px 16px;
            font-size: 0.95rem;
        }

        .action-group input:focus { outline: none; }
        .action-group button {
            background: #2A2A2A;
            border: none;
            color: white;
            width: 48px;
            border-radius: 40px;
            font-size: 1.3rem;
            cursor: pointer;
        }

        .withdraw-btn {
            flex: 1;
            background: #2A1F1F;
            border: 1px solid #4A3535;
            color: #FFB4A2;
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        /* Статистика */
        .stats-panel {
            background: #161616;
            border-radius: 36px;
            padding: 28px;
            margin-bottom: 36px;
            border: 1px solid #2A2A2A;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
        }

        .stat-card {
            background: #1E1E1E;
            border-radius: 28px;
            padding: 24px;
            border: 1px solid #333;
        }

        .stat-title { color: #888; font-size: 0.9rem; text-transform: uppercase; margin-bottom: 16px; }
        .stat-row {
            display: flex;
            justify-content: space-between;
            color: #B0B0B0;
            font-size: 1rem;
            padding: 8px 0;
            border-bottom: 1px dashed #2A2A2A;
        }
        .stat-row:last-child { border-bottom: none; }
        .stat-value { font-weight: 600; color: #E0E0E0; }
        .green { color: #78C578; }
        .red { color: #FF8E7A; }
        .blue { color: #9BBFFF; }

        /* Борги */
        .debts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .debt-column {
            background: #161616;
            border-radius: 36px;
            padding: 28px;
            border: 1px solid #2A2A2A;
        }

        .column-header h2 {
            font-size: 1.8rem;
            color: #E0E0E0;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #2A2A2A;
        }

        .debt-list {
            list-style: none;
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 24px;
        }

        .debt-list::-webkit-scrollbar { width: 6px; }
        .debt-list::-webkit-scrollbar-track { background: #222; border-radius: 20px; }
        .debt-list::-webkit-scrollbar-thumb { background: #444; border-radius: 20px; }

        .debt-item {
            background: #1E1E1E;
            border-radius: 28px;
            padding: 16px 20px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #333;
            cursor: pointer;
            transition: 0.15s;
        }

        .debt-item:hover { border-color: #5A5A5A; background: #242424; }
        .debt-item:active { background: #2A2A2A; transform: scale(0.98); }

        .debt-name { font-weight: 600; font-size: 1.1rem; color: #F0F0F0; }
        .debt-desc { font-size: 0.8rem; color: #777; }
        .debt-amount {
            font-weight: 700;
            font-size: 1.2rem;
            background: #1A1A1A;
            padding: 8px 18px;
            border-radius: 40px;
            border: 1px solid #3E4B5A;
            color: #9BBFFF;
        }
        .debt-amount.owe { background: #221B1B; color: #FFB4A2; border-color: #4E3A3A; }

        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        input, select, button {
            background: #242424;
            border: 1px solid #3A3A3A;
            color: white;
            padding: 14px 18px;
            border-radius: 60px;
            font-size: 0.95rem;
            outline: none;
        }

        input, select { flex: 1 1 130px; }
        select {
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="%23aaaaaa" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>');
            background-repeat: no-repeat;
            background-position: right 15px center;
        }

        .add-btn {
            background: #2F2F2F;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }

        .add-btn:hover { background: #3C3C3C; }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #2A2A2A;
            color: #6A6A6A;
            flex-wrap: wrap;
            gap: 16px;
        }

        .clear-btn {
            background: #2A1D1D;
            color: #FFAE9F;
            border: 1px solid #4E3535;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
        }

        .clear-btn:hover { background: #3A2626; }

        /* Модалка */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1A1A1A;
            border-radius: 48px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            border: 1px solid #333;
        }
        .modal-content h2 { color: #E0E0E0; font-size: 2rem; margin-bottom: 32px; }
        .modal-input, .modal-select {
            width: 100%;
            background: #252525;
            border: 1px solid #3A3A3A;
            color: white;
            padding: 16px 20px;
            border-radius: 60px;
            font-size: 1rem;
            margin-bottom: 16px;
        }
        .modal-select {
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%23aaaaaa" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>');
            background-repeat: no-repeat;
            background-position: right 20px center;
        }
        .modal-buttons { display: flex; gap: 12px; }
        .modal-btn {
            flex: 1;
            padding: 16px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 1rem;
        }
        .modal-btn.create { background: #78C578; color: #0A0A0A; }
        .modal-btn.cancel { background: #2A2A2A; color: white; }

        /* ========== МОБІЛЬНІ СТИЛІ ========== */
        @media (max-width: 768px) {
            .app { padding: 16px; border-radius: 32px; }
            
            .header h1 { font-size: 2rem; }
            .privacy { font-size: 0.9rem; padding: 8px 16px; }
            
            .pdf-buttons { flex-direction: column; gap: 10px; }
            .pdf-btn { width: 100%; justify-content: center; }
            
            .create-btn { width: 100%; justify-content: center; }
            
            .goals-grid { grid-template-columns: 1fr; gap: 16px; }
            .goal-card { padding: 20px; }
            .goal-name { font-size: 1.5rem; }
            .goal-target { font-size: 2rem; }
            
            .stats-panel { grid-template-columns: 1fr; gap: 12px; padding: 16px; }
            
            .debts-grid { grid-template-columns: 1fr; gap: 16px; }
            .debt-column { padding: 20px; }
            .column-header h2 { font-size: 1.5rem; }
            
            .form-row { flex-direction: column; }
            input, select { width: 100%; }
            
            .goal-actions { flex-direction: column; }
            .action-group { width: 100%; }
            .withdraw-btn { width: 100%; }
            
            .footer { flex-direction: column; align-items: stretch; }
            .clear-btn { width: 100%; }
            
            .modal-content { padding: 24px; }
            .modal-content h2 { font-size: 1.6rem; }
        }

        /* Для дуже маленьких екранів */
        @media (max-width: 480px) {
            .header { flex-direction: column; align-items: flex-start; }
            .header h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>БОРГИ</h1>
            <div class="privacy">🔒 ТІЛЬКИ Я БАЧУ</div>
        </div>

        <!-- PDF кнопки -->
        <div class="pdf-buttons">
            <button class="pdf-btn save" id="savePDFBtn">💾 ЗБЕРЕГТИ В PDF</button>
            <button class="pdf-btn load" id="loadPDFBtn">📂 ЗАВАНТАЖИТИ PDF</button>
        </div>

        <!-- Кнопка створення цілі -->
        <button class="create-btn" id="createGoalBtn">+ СТВОРИТИ НОВУ ЦІЛЬ</button>

        <!-- Цілі -->
        <div id="goalsContainer" class="goals-grid"></div>

        <!-- Статистика -->
        <div class="stats-panel">
            <div class="stat-card">
                <div class="stat-title">МЕНІ ВИНЕНІ</div>
                <div class="stat-row"><span>Гривня (UAH):</span><span class="stat-value" id="owedUAH">0.00 ₴</span></div>
                <div class="stat-row"><span>Євро (EUR):</span><span class="stat-value" id="owedEUR">0.00 €</span></div>
                <div class="stat-row"><span>Долар (USD):</span><span class="stat-value" id="owedUSD">0.00 $</span></div>
            </div>
            <div class="stat-card">
                <div class="stat-title">Я ВИНЕН</div>
                <div class="stat-row"><span>Гривня (UAH):</span><span class="stat-value" id="oweUAH">0.00 ₴</span></div>
                <div class="stat-row"><span>Євро (EUR):</span><span class="stat-value" id="oweEUR">0.00 €</span></div>
                <div class="stat-row"><span>Долар (USD):</span><span class="stat-value" id="oweUSD">0.00 $</span></div>
            </div>
            <div class="stat-card">
                <div class="stat-title">ЧИСТИЙ РЕЗУЛЬТАТ</div>
                <div class="stat-row"><span>Гривня:</span><span class="stat-value" id="netUAH">0.00 ₴</span></div>
                <div class="stat-row"><span>Євро:</span><span class="stat-value" id="netEUR">0.00 €</span></div>
                <div class="stat-row"><span>Долар:</span><span class="stat-value" id="netUSD">0.00 $</span></div>
            </div>
        </div>

        <!-- Борги -->
        <div class="debts-grid">
            <div class="debt-column">
                <div class="column-header"><h2>МЕНІ ВИНЕНІ</h2></div>
                <ul class="debt-list" id="owedList"></ul>
                <div class="form-row">
                    <input type="text" id="owedName" placeholder="Ім'я">
                    <input type="number" id="owedAmount" placeholder="Сума" step="0.01">
                </div>
                <div class="form-row">
                    <select id="owedCurrency">
                        <option value="UAH">🇺🇦 UAH</option>
                        <option value="EUR">🇪🇺 EUR</option>
                        <option value="USD">🇺🇸 USD</option>
                    </select>
                    <input type="text" id="owedDesc" placeholder="Опис">
                </div>
                <button class="add-btn" id="addOwedBtn">+ ДОДАТИ</button>
            </div>
            <div class="debt-column">
                <div class="column-header"><h2>Я ВИНЕН</h2></div>
                <ul class="debt-list" id="oweList"></ul>
                <div class="form-row">
                    <input type="text" id="oweName" placeholder="Кому">
                    <input type="number" id="oweAmount" placeholder="Сума" step="0.01">
                </div>
                <div class="form-row">
                    <select id="oweCurrency">
                        <option value="UAH">🇺🇦 UAH</option>
                        <option value="EUR">🇪🇺 EUR</option>
                        <option value="USD">🇺🇸 USD</option>
                    </select>
                    <input type="text" id="oweDesc" placeholder="Опис">
                </div>
                <button class="add-btn" id="addOweBtn">+ ДОДАТИ</button>
            </div>
        </div>

        <!-- Футер -->
        <div class="footer">
            <span>⚡ ЛОКАЛЬНЕ СХОВИЩЕ</span>
            <button class="clear-btn" id="clearAllBtn">ОЧИСТИТИ ВСЕ</button>
        </div>
    </div>

    <!-- Модалка -->
    <div class="modal" id="goalModal">
        <div class="modal-content">
            <h2>СТВОРИТИ ЦІЛЬ</h2>
            <input type="text" class="modal-input" id="goalName" placeholder="Назва (наприклад, ТЕЛЕФОН)">
            <select class="modal-select" id="goalCurrency">
                <option value="UAH">🇺🇦 ГРИВНЯ (UAH)</option>
                <option value="EUR">🇪🇺 ЄВРО (EUR)</option>
                <option value="USD">🇺🇸 ДОЛАР (USD)</option>
            </select>
            <input type="number" class="modal-input" id="goalTarget" placeholder="Цільова сума" min="1" step="1">
            <div class="modal-buttons">
                <button class="modal-btn create" id="saveGoalBtn">СТВОРИТИ</button>
                <button class="modal-btn cancel" id="cancelGoalBtn">СКАСУВАТИ</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const STORAGE_KEY = 'debts_goals_universal_v6';

            let state = {
                goals: [],
                debts: { owed: [], owe: [] }
            };

            function load() {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        state = {
                            goals: Array.isArray(parsed.goals) ? parsed.goals : [],
                            debts: {
                                owed: Array.isArray(parsed.debts?.owed) ? parsed.debts.owed : [],
                                owe: Array.isArray(parsed.debts?.owe) ? parsed.debts.owe : []
                            }
                        };
                    } else {
                        state.goals = [{ id: 'g1', name: 'ТЕЛЕФОН', currency: 'EUR', target: 650, saved: 50 }];
                        state.debts = {
                            owed: [
                                { id: '1', name: 'Саня', amount: 3400, currency: 'UAH', description: '' },
                                { id: '4', name: 'Петро', amount: 111, currency: 'EUR', description: '' }
                            ],
                            owe: [
                                { id: '2', name: 'Деніс', amount: 155, currency: 'EUR', description: '' },
                                { id: '3', name: 'Мама', amount: 2000, currency: 'UAH', description: '' }
                            ]
                        };
                    }
                } catch (e) {}
            }

            function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
            function genId() { return Date.now() + '-' + Math.random().toString(36).substring(2, 9); }
            function getSymbol(c) { return c === 'UAH' ? '₴' : c === 'EUR' ? '€' : '$'; }
            function esc(str) { return str ? String(str).replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])) : ''; }

            function updateStats() {
                let oUAH=0, oEUR=0, oUSD=0, wUAH=0, wEUR=0, wUSD=0;
                state.debts.owed.forEach(i => { let a=Number(i.amount)||0; if(i.currency==='UAH') oUAH+=a; else if(i.currency==='EUR') oEUR+=a; else if(i.currency==='USD') oUSD+=a; });
                state.debts.owe.forEach(i => { let a=Number(i.amount)||0; if(i.currency==='UAH') wUAH+=a; else if(i.currency==='EUR') wEUR+=a; else if(i.currency==='USD') wUSD+=a; });
                document.getElementById('owedUAH').innerHTML = oUAH.toFixed(2)+' ₴';
                document.getElementById('owedEUR').innerHTML = oEUR.toFixed(2)+' €';
                document.getElementById('owedUSD').innerHTML = oUSD.toFixed(2)+' $';
                document.getElementById('oweUAH').innerHTML = wUAH.toFixed(2)+' ₴';
                document.getElementById('oweEUR').innerHTML = wEUR.toFixed(2)+' €';
                document.getElementById('oweUSD').innerHTML = wUSD.toFixed(2)+' $';
                let nUAH = oUAH-wUAH, nEUR = oEUR-wEUR, nUSD = oUSD-wUSD;
                document.getElementById('netUAH').innerHTML = (nUAH>=0?'+':'')+nUAH.toFixed(2)+' ₴';
                document.getElementById('netEUR').innerHTML = (nEUR>=0?'+':'')+nEUR.toFixed(2)+' €';
                document.getElementById('netUSD').innerHTML = (nUSD>=0?'+':'')+nUSD.toFixed(2)+' $';
            }

            function renderGoals() {
                let html = '';
                state.goals.forEach(g => {
                    let s = getSymbol(g.currency), p = g.target>0 ? (g.saved/g.target)*100 : 0, r = Math.max(0, g.target-g.saved);
                    html += `<div class="goal-card" data-id="${g.id}"><div class="goal-delete" onclick="deleteGoal('${g.id}')">✕</div><div class="goal-name">${esc(g.name)}</div><div class="goal-currency">${g.currency}</div><div class="goal-target">${g.target.toFixed(0)} ${s}</div><div class="progress-stats"><span>Накопичено: ${g.saved.toFixed(2)} ${s}</span><span>Залишилось: ${r.toFixed(2)} ${s}</span></div><div class="progress-bar"><div class="progress-fill" style="width: ${Math.min(p,100)}%"></div></div><div class="goal-actions"><div class="action-group"><input type="number" id="add-${g.id}" placeholder="Сума" step="1"><button onclick="addToGoal('${g.id}')">+</button></div><button class="withdraw-btn" onclick="withdrawFromGoal('${g.id}')">ЗНЯТИ</button></div></div>`;
                });
                document.getElementById('goalsContainer').innerHTML = state.goals.length ? html : '<div style="grid-column:1/-1;text-align:center;padding:60px;background:#161616;border-radius:32px;color:#666;">➕ СТВОРІТЬ ПЕРШУ ЦІЛЬ</div>';
            }

            window.addToGoal = function(id) {
                let i = document.getElementById('add-'+id), a = parseFloat(i.value);
                if (!isNaN(a) && a>0) { let g = state.goals.find(g=>g.id===id); if(g){ g.saved+=a; save(); renderGoals(); } }
                i.value = '';
            };
            window.withdrawFromGoal = function(id) {
                let a = parseFloat(prompt('Скільки зняти?','0'));
                if (!isNaN(a) && a>0) { let g = state.goals.find(g=>g.id===id); if(g && a<=g.saved) { g.saved-=a; save(); renderGoals(); } else alert('Недостатньо коштів'); }
            };
            window.deleteGoal = function(id) { if(confirm('Видалити цю ціль?')){ state.goals = state.goals.filter(g=>g.id!==id); save(); renderGoals(); }};

            function renderDebts() {
                let owed = '', owe = '';
                state.debts.owed.forEach(i => { let s=getSymbol(i.currency); owed += `<li class="debt-item" data-id="${i.id}"><div><div class="debt-name">${esc(i.name)}</div><div class="debt-desc">${esc(i.description)||''}</div></div><div class="debt-amount">${Number(i.amount).toFixed(2)} ${s}</div></li>`; });
                document.getElementById('owedList').innerHTML = owed || '<li style="color:#5A5A5A;text-align:center;padding:20px;">ПОКИ НІХТО НЕ ВИНЕН</li>';
                document.querySelectorAll('#owedList .debt-item').forEach(el => el.addEventListener('click', function(){ let id=this.dataset.id; if(id&&confirm('Видалити?')){ state.debts.owed=state.debts.owed.filter(d=>d.id!==id); save(); renderDebts(); updateStats(); }}));

                state.debts.owe.forEach(i => { let s=getSymbol(i.currency); owe += `<li class="debt-item" data-id="${i.id}"><div><div class="debt-name">${esc(i.name)}</div><div class="debt-desc">${esc(i.description)||''}</div></div><div class="debt-amount owe">${Number(i.amount).toFixed(2)} ${s}</div></li>`; });
                document.getElementById('oweList').innerHTML = owe || '<li style="color:#5A5A5A;text-align:center;padding:20px;">ПОКИ НІКОМУ НЕ ВИНЕН</li>';
                document.querySelectorAll('#oweList .debt-item').forEach(el => el.addEventListener('click', function(){ let id=this.dataset.id; if(id&&confirm('Видалити?')){ state.debts.owe=state.debts.owe.filter(d=>d.id!==id); save(); renderDebts(); updateStats(); }}));
            }

            function addOwed() {
                let n=document.getElementById('owedName').value.trim(), a=parseFloat(document.getElementById('owedAmount').value), c=document.getElementById('owedCurrency').value, d=document.getElementById('owedDesc').value.trim();
                if(!n||isNaN(a)||a<=0){ alert('Заповніть поля'); return; }
                state.debts.owed.push({id:genId(), name:n, amount:a, currency:c, description:d});
                save(); document.getElementById('owedName').value=document.getElementById('owedAmount').value=document.getElementById('owedDesc').value='';
                renderDebts(); updateStats();
            }
            function addOwe() {
                let n=document.getElementById('oweName').value.trim(), a=parseFloat(document.getElementById('oweAmount').value), c=document.getElementById('oweCurrency').value, d=document.getElementById('oweDesc').value.trim();
                if(!n||isNaN(a)||a<=0){ alert('Заповніть поля'); return; }
                state.debts.owe.push({id:genId(), name:n, amount:a, currency:c, description:d});
                save(); document.getElementById('oweName').value=document.getElementById('oweAmount').value=document.getElementById('oweDesc').value='';
                renderDebts(); updateStats();
            }

            function clearAll() { if(confirm('Видалити ВСЕ?')){ state={goals:[], debts:{owed:[], owe:[]}}; save(); renderGoals(); renderDebts(); updateStats(); }}

            function saveToPDF() {
                const blob = new Blob([JSON.stringify({goals:state.goals, debts:state.debts}, null, 2)], {type:'application/json'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `borhy-${new Date().toLocaleDateString()}.json`;
                a.click();
                alert('✅ Бекап збережено');
            }
            function loadFromPDF() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json';
                input.onchange = e => {
                    const file = e.target.files[0];
                    if(!file) return;
                    const reader = new FileReader();
                    reader.onload = ev => {
                        try {
                            const d = JSON.parse(ev.target.result);
                            if(d && Array.isArray(d.goals) && d.debts) {
                                state = { goals:d.goals, debts:{ owed:d.debts.owed||[], owe:d.debts.owe||[] } };
                                save(); renderGoals(); renderDebts(); updateStats();
                                alert('✅ Дані відновлено');
                            } else alert('❌ Невірний формат');
                        } catch { alert('❌ Помилка читання'); }
                    };
                    reader.readAsText(file);
                };
                input.click();
            }

            const modal = document.getElementById('goalModal');
            document.getElementById('createGoalBtn').addEventListener('click', ()=>modal.classList.add('active'));
            document.getElementById('cancelGoalBtn').addEventListener('click', ()=>{
                modal.classList.remove('active');
                document.getElementById('goalName').value = document.getElementById('goalTarget').value = '';
            });
            document.getElementById('saveGoalBtn').addEventListener('click', ()=>{
                let n = document.getElementById('goalName').value.trim().toUpperCase();
                let c = document.getElementById('goalCurrency').value;
                let t = parseFloat(document.getElementById('goalTarget').value);
                if(!n||isNaN(t)||t<=0){ alert('Введіть назву та суму'); return; }
                state.goals.push({id:genId(), name:n, currency:c, target:t, saved:0});
                save(); renderGoals();
                document.getElementById('goalName').value = document.getElementById('goalTarget').value = '';
                modal.classList.remove('active');
            });
            modal.addEventListener('click', e => { if(e.target===modal) modal.classList.remove('active'); });

            load();
            renderGoals();
            renderDebts();
            updateStats();

            document.getElementById('savePDFBtn').addEventListener('click', saveToPDF);
            document.getElementById('loadPDFBtn').addEventListener('click', loadFromPDF);
            document.getElementById('addOwedBtn').addEventListener('click', addOwed);
            document.getElementById('addOweBtn').addEventListener('click', addOwe);
            document.getElementById('clearAllBtn').addEventListener('click', clearAll);
        })();
    </script>
</body>
</html>
